<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 版本標記：白標版 v1.0.1 -->
    <title>賣場管理系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #FAF7F2; color: #3A3A3A; overflow-x: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .cursive-logo { 
            font-family: 'Playfair Display', serif; 
            font-style: italic;
            font-weight: 900;
            letter-spacing: 0.02em;
        }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast-wrap { transition: opacity 0.3s ease, transform 0.3s ease; }
        .toast-show { opacity: 1; transform: translate(-50%, 0); }
        .toast-hide { opacity: 0; transform: translate(-50%, -12px); pointer-events: none; }
        .line-btn {
            background: linear-gradient(135deg, #06C755, #00B348);
            transition: all 0.2s ease;
        }
        .line-btn:active { transform: scale(0.96); }

        /* 叫貨狀態樣式 */
        .status-not-ordered { background: #EBD5D0; color: #A05550; }
        .status-ordered     { background: #EDE2CC; color: #8A6D3B; }
        .status-arrived     { background: #D5DCC5; color: #6B7A4A; }

        /* 螢幕上：列印容器預設隱藏 */
        .print-only { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, onSnapshot, setDoc, writeBatch, serverTimestamp, deleteDoc } from 'firebase/firestore';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { Lock, Plus, X, Sparkles, Loader2, User, DollarSign, Trash2, Settings, ListChecks, Copy, AlertTriangle, FileText, Truck, Link as LinkIcon, Calendar, CheckCircle, MessageCircle, Phone, Package, PackageCheck, PackageX, ShoppingCart, Users, RefreshCw, Search, Filter, Send, Bell, DollarSign as MoneyIcon, Fingerprint, Shield, ShieldCheck, RotateCcw, Gift, Wallet, TrendingUp, TrendingDown, History, Minus, Printer, FileOutput, MapPin, CreditCard, BarChart3, ChevronRight, ChevronDown, Tag, Zap, Clock, ToggleLeft, ToggleRight } from 'lucide-react';

        // ═══════════════════════════════════════════════════════════════
        // ⚙️ 賣家設定區（出貨前由 Fann 填入買家的 Firebase 設定）
        // ═══════════════════════════════════════════════════════════════
       const firebaseConfig = {
  apiKey: "AIzaSyDANVBYhHxlG2lr8apSVFgi9TGVuX1vOQg",
  authDomain: "wanmei-e4077.firebaseapp.com",
  projectId: "wanmei-e4077",
  storageBucket: "wanmei-e4077.firebasestorage.app",
  messagingSenderId: "852508677938",
  appId: "1:852508677938:web:173296cb601d84649d692b"
};
        // ═══════════════════════════════════════════════════════════════

        const SHIPPING_FEE = 38;
        const ARCHIVE_DAYS_THRESHOLD = 60;
        const BIOMETRIC_KEY = 'shop-erp-bio-cred';
        const BIOMETRIC_ENABLED_KEY = 'shop-erp-bio-on';
        const SETUP_KEY = 'shop-erp-config';
        const LICENSE_KEY = 'shop-erp-license';

        // ✅ 授權碼驗證
        const verifyLicense = (code) => {
            if (!code) return false;
            const cl = code.trim().toUpperCase();
            if (!/^FB-[A-Z0-9]{6}-[A-Z0-9]{2}$/.test(cl)) return false;
            const body = cl.substring(3, 9);
            let sum = 0;
            for (let i = 0; i < body.length; i++) sum += body.charCodeAt(i);
            return ((sum * 7) % 1296).toString(36).toUpperCase().padStart(2, '0') === cl.substring(10);
        };
        const isLicensed = () => verifyLicense(localStorage.getItem(LICENSE_KEY));

        // ✅ 品牌設定（品牌名 + PIN + LINE，從 localStorage 讀取）
        const loadSetup = () => { try { return JSON.parse(localStorage.getItem(SETUP_KEY)); } catch { return null; } };
        const saveSetup = (cfg) => localStorage.setItem(SETUP_KEY, JSON.stringify(cfg));
        const _setup = loadSetup();

        // ✅ 安全初始化 Firebase
        let app = null, auth = null, db = null;
        let appId = 'shop-erp-v1';
        let ADMIN_PIN = _setup ? (_setup.pin || '8888') : '8888';
        // ✅ v1.0.1：LINE 官方帳號固定為 546hbnos（setup 有填則優先用 setup 的）
        let LINE_OA_ID = _setup ? (_setup.line || '546hbnos') : '546hbnos';
        let BRAND_NAME = _setup ? (_setup.brand || '我的賣場') : '我的賣場';
        let FIREBASE_OK = false;

        try {
            if (firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('請填入')) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                FIREBASE_OK = true;
            }
        } catch (e) { console.error('Firebase init error:', e); }

        // ─── WebAuthn 生物辨識工具函式 ───────────────────────────────
        const isBiometricSupported = () => {
            return window.PublicKeyCredential && 
                   typeof window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable === 'function';
        };
        const checkBiometricAvailable = async () => {
            if (!isBiometricSupported()) return false;
            try {
                return await window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
            } catch (e) { return false; }
        };
        const generateChallenge = () => {
            const arr = new Uint8Array(32);
            crypto.getRandomValues(arr);
            return arr;
        };
        const registerBiometric = async () => {
            const challenge = generateChallenge();
            const userIdBytes = new TextEncoder().encode('fann-beauty-admin');
            const credential = await navigator.credentials.create({
                publicKey: {
                    challenge,
                    rp: { name: BRAND_NAME, id: window.location.hostname },
                    user: {
                        id: userIdBytes,
                        name: 'admin@fann.beauty',
                        displayName: BRAND_NAME + ' 管理員'
                    },
                    pubKeyCredParams: [
                        { type: 'public-key', alg: -7 },
                        { type: 'public-key', alg: -257 }
                    ],
                    authenticatorSelection: {
                        authenticatorAttachment: 'platform',
                        userVerification: 'required',
                        residentKey: 'preferred'
                    },
                    timeout: 60000,
                    attestation: 'none'
                }
            });
            const credId = Array.from(new Uint8Array(credential.rawId))
                .map(b => b.toString(16).padStart(2, '0')).join('');
            localStorage.setItem(BIOMETRIC_KEY, credId);
            localStorage.setItem(BIOMETRIC_ENABLED_KEY, 'true');
            return credId;
        };
        const verifyBiometric = async () => {
            const credIdHex = localStorage.getItem(BIOMETRIC_KEY);
            if (!credIdHex) throw new Error('尚未註冊 Face ID');
            const credId = new Uint8Array(credIdHex.match(/.{2}/g).map(b => parseInt(b, 16)));
            const challenge = generateChallenge();
            const assertion = await navigator.credentials.get({
                publicKey: {
                    challenge,
                    allowCredentials: [{ id: credId, type: 'public-key' }],
                    userVerification: 'required',
                    timeout: 60000
                }
            });
            return !!assertion;
        };

        // ─── 叫貨狀態定義 ─────────────────────────────────────────────
        const STOCK_STATUS = {
            none:    { label: '未訂貨', icon: PackageX,     class: 'status-not-ordered', short: '未訂' },
            ordered: { label: '已訂貨', icon: ShoppingCart, class: 'status-ordered',     short: '已訂' },
            arrived: { label: '已到貨', icon: PackageCheck, class: 'status-arrived',     short: '到貨' }
        };
        const nextStockStatus = (s) => s === 'none' ? 'ordered' : s === 'ordered' ? 'arrived' : 'none';

        // ─── 工具函式 ────────────────────────────────────────────────
        const formatDate = (dateObj) => {
            if (!dateObj) return '';
            const d = dateObj.seconds ? new Date(dateObj.seconds * 1000) : new Date(dateObj);
            return `${d.getMonth() + 1}/${d.getDate()}`;
        };
        const formatFullDate = (dateObj) => {
            if (!dateObj) return '';
            const d = dateObj.seconds ? new Date(dateObj.seconds * 1000) : new Date(dateObj);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };
        const generateLocalId = () => 'local-' + Date.now().toString(36) + '-' + Math.random().toString(36).substring(2, 9);

        function getBundlePrice(qty, priceStr) {
            if (!priceStr || qty <= 0) return 0;
            const tiers = String(priceStr).split('/').map(s => Number(s.trim()));
            if (tiers.length === 1) return (tiers[0] || 0) * qty;
            let remainingQty = qty;
            let total = 0;
            for (let size = tiers.length; size >= 1; size--) {
                const bundlePrice = tiers[size - 1];
                if (bundlePrice > 0 && remainingQty >= size) {
                    const count = Math.floor(remainingQty / size);
                    total += count * bundlePrice;
                    remainingQty %= size;
                }
            }
            if (remainingQty > 0 && tiers[0] > 0) total += remainingQty * tiers[0];
            return total;
        }

        const getPriceStr = (entry) => {
            if (entry == null) return '';
            if (typeof entry === 'string' || typeof entry === 'number') return String(entry);
            return String(entry.price || '');
        };
        const getCost = (entry) => {
            if (entry == null || typeof entry !== 'object') return 0;
            return Number(entry.cost) || 0;
        };
        const getName = (entry) => {
            if (entry == null || typeof entry !== 'object') return '';
            return String(entry.name || '').trim();
        };

        // ─── 促銷計算工具函式 ─────────────────────────────────────
        const isPromotionActive = (promo) => {
            if (!promo || !promo.enabled) return false;
            const now = new Date();
            if (promo.startAt && new Date(promo.startAt) > now) return false;
            if (promo.endAt   && new Date(promo.endAt)   < now) return false;
            return true;
        };
        const getEligibleSubtotal = (promo, codeGroups) => {
            let subtotal = 0;
            let qty = 0;
            const useWhitelist = promo.itemFilter === 'whitelist' && Array.isArray(promo.whitelist) && promo.whitelist.length > 0;
            Object.entries(codeGroups).forEach(([code, cg]) => {
                if (useWhitelist && !promo.whitelist.includes(code)) return;
                subtotal += (cg.subtotal || 0);
                qty += (cg.totalQty || 0);
            });
            return { subtotal, qty };
        };
        const calcPromoDiscount = (promo, codeGroups, locked = false) => {
            if (!locked && !isPromotionActive(promo)) return 0;
            const { subtotal: eligibleTotal, qty: eligibleQty } = getEligibleSubtotal(promo, codeGroups);
            if (eligibleTotal === 0) return 0;
            switch (promo.type) {
                case 'fixed':
                    return Math.min((Number(promo.value) || 0) * eligibleQty, eligibleTotal);
                case 'percent': {
                    const pct = Number(promo.percent) || 100;
                    return Math.round(eligibleTotal * (100 - pct) / 100);
                }
                case 'threshold':
                    return eligibleTotal >= (Number(promo.threshold) || 0)
                        ? (Number(promo.thresholdDiscount) || 0) : 0;
                default: return 0;
            }
        };
        const promoLabel = (promo) => {
            if (!promo) return '';
            const suffix = promo.itemFilter === 'whitelist' && promo.whitelist?.length > 0
                ? `（限 ${promo.whitelist.join('、')}）` : '';
            switch (promo.type) {
                case 'fixed':    return `每件折 $${promo.value}${suffix}`;
                case 'percent':  return `${promo.percent} 折${suffix}`;
                case 'threshold':return `滿 $${promo.threshold} 折 $${promo.thresholdDiscount}${suffix}`;
                default:         return '';
            }
        };

        // ─── 主元件 ──────────────────────────────────────────────────
        const App = () => {
          const [user, setUser] = useState(null);
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          const [pinInput, setPinInput] = useState('');
          const [biometricAvailable, setBiometricAvailable] = useState(false);
          const [biometricEnabled, setBiometricEnabled] = useState(false);
          const [biometricChecking, setBiometricChecking] = useState(true);
          const [biometricError, setBiometricError] = useState('');
          const [showPinFallback, setShowPinFallback] = useState(false);
          const [showEnableBiometric, setShowEnableBiometric] = useState(false);

          const [adminTab, setAdminTab] = useState('orders');
          const [orders, setOrders] = useState([]);
          const [priceBook, setPriceBook] = useState({});
          const [storeConfig, setStoreConfig] = useState({ 
              freeShippingThreshold: 1500, 
              myshipUrl: '', 
              lineOaId: '',
              bankName: '',
              bankCode: '',
              bankAccount: '',
              bankHolder: ''
          });
          const [newFreeShippingThreshold, setNewFreeShippingThreshold] = useState('');
          const [newMyshipUrl, setNewMyshipUrl] = useState('');
          const [newLineOaId, setNewLineOaId] = useState('');
          const [newBankName, setNewBankName] = useState('');
          const [newBankCode, setNewBankCode] = useState('');
          const [newBankAccount, setNewBankAccount] = useState('');
          const [newBankHolder, setNewBankHolder] = useState('');

          const [promotion, setPromotion] = useState({
              enabled: false, name: '', startAt: '', endAt: '',
              type: 'fixed', value: 0, percent: 95,
              threshold: 500, thresholdDiscount: 100,
              itemFilter: 'all', whitelist: []
          });
          const [rawText, setRawText] = useState('');
          const [isParsing, setIsParsing] = useState(false);
          const [showSummary, setShowSummary] = useState(false);
          const [summaryDateFilter, setSummaryDateFilter] = useState(formatFullDate(new Date()));
          const [newPriceCode, setNewPriceCode] = useState('');
          const [newPriceValue, setNewPriceValue] = useState('');
          const [newPriceCost, setNewPriceCost] = useState('');
          const [newPriceName, setNewPriceName] = useState('');
          const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });
          const toastTimer = useRef(null);

          const [stockViewMode, setStockViewMode] = useState('code');
          const [searchQuery, setSearchQuery] = useState('');
          const [statusFilter, setStatusFilter] = useState('all');
          const [messageModal, setMessageModal] = useState({ show: false, group: null });

          const [storeCredits, setStoreCredits] = useState({});
          const [customerProfiles, setCustomerProfiles] = useState({});
          const [archivedOrders, setArchivedOrders] = useState([]);
          const [monthFilter, setMonthFilter] = useState('all');
          const [hideShipped, setHideShipped] = useState(false);
          const [isArchiving, setIsArchiving] = useState(false);
          const [autoArchiveChecked, setAutoArchiveChecked] = useState(false);

          const [creditModal, setCreditModal] = useState({ show: false, customerName: '', mode: 'add' });
          const [creditAmount, setCreditAmount] = useState('');
          const [creditNote, setCreditNote] = useState('');
          const [creditSearch, setCreditSearch] = useState('');

          const [pickingModal, setPickingModal] = useState(false);
          const [pickingFilter, setPickingFilter] = useState('completed');
          const [pickingDate, setPickingDate] = useState('');

          const showMessage = (msg, type = 'success') => {
              if (toastTimer.current) clearTimeout(toastTimer.current);
              setToast({ show: true, msg, type });
              toastTimer.current = setTimeout(() => setToast(t => ({ ...t, show: false })), 3000);
          };

          useEffect(() => {
            signInAnonymously(auth).catch(() => {});
            onAuthStateChanged(auth, u => setUser(u));
            (async () => {
                const available = await checkBiometricAvailable();
                setBiometricAvailable(available);
                const enabled = localStorage.getItem(BIOMETRIC_ENABLED_KEY) === 'true';
                setBiometricEnabled(enabled && available);
                setBiometricChecking(false);
            })();
          }, []);

          const tryBiometricLogin = async () => {
              setBiometricError('');
              try {
                  const verified = await verifyBiometric();
                  if (verified) { setIsAuthenticated(true); showMessage("Face ID 驗證成功 ✅"); }
              } catch (err) {
                  if (err.name === 'NotAllowedError') setBiometricError('Face ID 已取消或失敗');
                  else if (err.name === 'InvalidStateError') setBiometricError('此裝置尚未註冊，請改用 PIN 碼');
                  else setBiometricError('驗證失敗：' + (err.message || err.name));
              }
          };

          const handlePinLogin = () => {
              if (pinInput !== ADMIN_PIN) { showMessage("密碼錯誤 ❌", 'error'); return; }
              setIsAuthenticated(true);
              setPinInput('');
              if (biometricAvailable && !biometricEnabled) setTimeout(() => setShowEnableBiometric(true), 500);
          };

          const handleEnableBiometric = async () => {
              try {
                  await registerBiometric();
                  setBiometricEnabled(true);
                  setShowEnableBiometric(false);
                  showMessage("Face ID 已啟用 🎉 下次開啟就能用");
              } catch (err) {
                  if (err.name === 'NotAllowedError') showMessage("已取消啟用", 'warn');
                  else showMessage("啟用失敗：" + (err.message || err.name), 'error');
                  setShowEnableBiometric(false);
              }
          };

          const handleDisableBiometric = () => {
              if (confirm('確定要關閉 Face ID 解鎖嗎？\n下次需輸入 PIN 碼登入。')) {
                  localStorage.removeItem(BIOMETRIC_KEY);
                  localStorage.removeItem(BIOMETRIC_ENABLED_KEY);
                  setBiometricEnabled(false);
                  showMessage("Face ID 已關閉");
              }
          };

          useEffect(() => {
            if (!user) return;
            const unsubOrders = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), (snap) => {
                setOrders(snap.docs.map(d => ({ ...d.data(), id: d.id })));
            });
            const unsubPrice = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'priceBook'), (d) => {
              if (d.exists()) setPriceBook(d.data());
            });
            const unsubStore = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'storeConfig'), (d) => {
                if (d.exists()) {
                    const config = d.data();
                    setStoreConfig(config);
                    setNewFreeShippingThreshold(config.freeShippingThreshold || 1500);
                    setNewMyshipUrl(config.myshipUrl || '');
                    setNewBankName(config.bankName || '');
                    setNewBankCode(config.bankCode || '');
                    setNewBankAccount(config.bankAccount || '');
                    setNewBankHolder(config.bankHolder || '');
                    setNewLineOaId(config.lineOaId || '');
                }
            });
            const unsubPromo = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'promotion'), (d) => {
                if (d.exists()) setPromotion(d.data());
            });
            const unsubCredits = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'storeCredits'), (snap) => {
                const map = {};
                snap.docs.forEach(d => { map[d.id] = d.data(); });
                setStoreCredits(map);
            });
            const unsubProfiles = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'customerProfiles'), (snap) => {
                const map = {};
                snap.docs.forEach(d => { map[d.id] = d.data(); });
                setCustomerProfiles(map);
            });
            const unsubArchived = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'archivedOrders'), (snap) => {
                setArchivedOrders(snap.docs.map(d => ({ ...d.data(), id: d.id, _archived: true })));
            });
            return () => { unsubOrders(); unsubPrice(); unsubStore(); unsubCredits(); unsubProfiles(); unsubArchived(); unsubPromo(); };
          }, [user]);

          const groupedOrders = useMemo(() => {
            const groups = {};
            orders.forEach(o => {
              const name = o.customerName || '未知';
              if (!groups[name]) groups[name] = {
                  name, items: [], codeGroups: {}, itemTotal: 0, finalTotal: 0,
                  status: 'pending', date: o.createdAt, customerLineId: o.customerLineId || ''
              };
              groups[name].items.push(o);
              if (!groups[name].codeGroups[o.itemCode]) {
                  groups[name].codeGroups[o.itemCode] = { items: [], totalQty: 0, priceStr: o.price };
              }
              groups[name].codeGroups[o.itemCode].items.push(o);
              groups[name].codeGroups[o.itemCode].totalQty += (Number(o.quantity) || 1);
              if (o.status === 'shipped') groups[name].status = 'shipped';
              else if (o.status === 'completed' && groups[name].status !== 'shipped') groups[name].status = 'completed';
              if (o.customerLineId) groups[name].customerLineId = o.customerLineId;
              if (o.creditApplied && !groups[name].creditApplied) groups[name].creditApplied = Number(o.creditApplied) || 0;
              if (o.promoSnapshot && !groups[name].promoSnapshot) groups[name].promoSnapshot = o.promoSnapshot;
            });
            const threshold = storeConfig.freeShippingThreshold || 1500;
            Object.values(groups).forEach(g => {
                let total = 0;
                Object.values(g.codeGroups).forEach(cg => {
                    cg.subtotal = getBundlePrice(cg.totalQty, cg.priceStr);
                    total += cg.subtotal;
                });
                g.itemTotal = total;
                g.hasShippingFee = g.itemTotal < threshold && g.itemTotal > 0;
                const baseTotal = g.hasShippingFee ? g.itemTotal + SHIPPING_FEE : g.itemTotal;
                let usedPromo = null;
                let isLocked = false;
                if (g.promoSnapshot && g.promoSnapshot.enabled) {
                    usedPromo = g.promoSnapshot; isLocked = true;
                } else if (promotion && promotion.enabled) {
                    const orderTime = g.date?.seconds ? new Date(g.date.seconds * 1000) : new Date();
                    if ((!promotion.startAt || new Date(promotion.startAt) <= orderTime) &&
                        (!promotion.endAt   || new Date(promotion.endAt)   >= orderTime)) {
                        usedPromo = promotion;
                    }
                }
                g.promoDiscount = usedPromo ? calcPromoDiscount(usedPromo, g.codeGroups, isLocked) : 0;
                g.promoName = usedPromo ? (usedPromo.name || '促銷折扣') : '';
                g.promoUsed = usedPromo;
                g.creditApplied = g.creditApplied || 0;
                g.finalTotal = Math.max(0, baseTotal - g.promoDiscount - g.creditApplied);
                g.creditBalance = storeCredits[g.name]?.balance || 0;
            });
            return Object.values(groups).sort((a, b) => (b.date?.seconds || 0) - (a.date?.seconds || 0));
          }, [orders, storeConfig.freeShippingThreshold, storeCredits, promotion]);

          const filteredOrders = useMemo(() => {
              return groupedOrders.filter(g => {
                  if (monthFilter !== 'all') {
                      if (!g.date || !g.date.seconds) return false;
                      const d = new Date(g.date.seconds * 1000);
                      const ym = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                      if (ym !== monthFilter) return false;
                  }
                  if (hideShipped && g.status === 'shipped') return false;
                  if (statusFilter !== 'all' && g.status !== statusFilter) return false;
                  if (searchQuery.trim()) {
                      const q = searchQuery.trim().toLowerCase();
                      return g.name.toLowerCase().includes(q) || (g.customerLineId || '').toLowerCase().includes(q);
                  }
                  return true;
              });
          }, [groupedOrders, searchQuery, statusFilter, monthFilter, hideShipped]);

          const stockByCode = useMemo(() => {
              const byCode = {};
              orders.forEach(o => {
                  const code = o.itemCode;
                  if (!byCode[code]) byCode[code] = { code, totalQty: 0, items: [], customers: new Set(), arrivedQty: 0, orderedQty: 0 };
                  byCode[code].totalQty += (Number(o.quantity) || 1);
                  byCode[code].items.push(o);
                  byCode[code].customers.add(o.customerName);
                  const st = o.stockStatus || 'none';
                  if (st === 'arrived') byCode[code].arrivedQty += (Number(o.quantity) || 1);
                  if (st === 'ordered') byCode[code].orderedQty += (Number(o.quantity) || 1);
              });
              return Object.values(byCode).sort((a, b) => a.code.localeCompare(b.code));
          }, [orders]);

          const stockByCustomer = useMemo(() => {
              return groupedOrders.map(g => {
                  let totalQty = 0, arrivedQty = 0, orderedQty = 0;
                  g.items.forEach(it => {
                      const qty = (Number(it.quantity) || 1);
                      totalQty += qty;
                      const st = it.stockStatus || 'none';
                      if (st === 'arrived') arrivedQty += qty;
                      if (st === 'ordered') orderedQty += qty;
                  });
                  const allArrived = totalQty > 0 && arrivedQty === totalQty;
                  const anyOrdered = orderedQty > 0 || arrivedQty > 0;
                  return { ...g, totalQty, arrivedQty, orderedQty, allArrived, anyOrdered };
              });
          }, [groupedOrders]);

          const vendorSummary = useMemo(() => {
            const summary = {};
            orders.forEach(o => {
              if (summaryDateFilter && formatFullDate(o.createdAt) !== summaryDateFilter) return;
              const key = `${o.itemCode}${o.spec ? ` (${o.spec})` : ''}`;
              if (!summary[key]) summary[key] = 0;
              summary[key] += (Number(o.quantity) || 1);
            });
            return Object.entries(summary).sort((a, b) => a[0].localeCompare(b[0]));
          }, [orders, summaryDateFilter]);

          const availableMonths = useMemo(() => {
              const set = new Set();
              orders.forEach(o => {
                  if (!o.createdAt || !o.createdAt.seconds) return;
                  const d = new Date(o.createdAt.seconds * 1000);
                  set.add(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
              });
              return Array.from(set).sort().reverse();
          }, [orders]);

          const handleAIParse = async () => {
            if (!rawText.trim()) return;
            setIsParsing(true);
            await new Promise(r => setTimeout(r, 400));
            const lines = rawText.split('\n');
            const newOrders = [];
            let lastSeenName = "";
            lines.forEach(line => {
              const trimmed = line.trim();
              if (!trimmed) return;
              let currentName = "";
              let content = trimmed;
              const firstSpaceIdx = trimmed.search(/\s+/);
              if (firstSpaceIdx !== -1) {
                  const potentialName = trimmed.substring(0, firstSpaceIdx).trim();
                  const remaining = trimmed.substring(firstSpaceIdx).trim();
                  if (!potentialName.includes('+') && !/^\d+$/.test(potentialName)) {
                      currentName = potentialName;
                      lastSeenName = potentialName;
                      content = remaining;
                  }
              }
              const targetName = currentName || lastSeenName;
              if (!targetName) return;
              const itemRegex = /([a-zA-Z0-9_-]+)\s*([^+\n]*?)\s*\+\s*(\d+)/g;
              let match;
              while ((match = itemRegex.exec(content)) !== null) {
                  const code = match[1].trim().toUpperCase();
                  const spec = match[2].replace(/^[\s\/,]+|[\s\/,]+$/g, '').trim();
                  newOrders.push({
                      customerName: targetName, itemCode: code, spec,
                      quantity: Number(match[3]), price: getPriceStr(priceBook[code]) || 0,
                      status: 'pending', customerLineId: '', stockStatus: 'none',
                      ...(isPromotionActive(promotion) ? { promoSnapshot: { ...promotion } } : {})
                  });
              }
            });
            if (newOrders.length > 0) {
                if (user) {
                    const batch = writeBatch(db);
                    newOrders.forEach(o => {
                        const ref = doc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'));
                        batch.set(ref, { ...o, createdAt: serverTimestamp() });
                    });
                    await batch.commit();
                    showMessage(`✅ 抓到 ${newOrders.length} 筆，已同步雲端！`);
                } else {
                    const localItems = newOrders.map(o => ({ ...o, id: generateLocalId(), createdAt: { seconds: Date.now() / 1000 } }));
                    setOrders(prev => [...localItems, ...prev]);
                    showMessage("已儲存至本地暫存 (離線模式)");
                }
                setRawText('');
            } else {
                showMessage("⚠️ 辨識失敗，請確認格式", 'warn');
            }
            setIsParsing(false);
          };

          const handleExportSpreadsheet = () => {
              try {
                  if (groupedOrders.length === 0) { showMessage("目前沒有訂單資料喔！", 'warn'); return; }
                  let tsv = "名字\tLINE ID\t品項明細\t數量\t金額\t備註\n";
                  groupedOrders.forEach(group => {
                      let isFirstLine = true;
                      Object.entries(group.codeGroups).forEach(([code, cg]) => {
                          cg.items.forEach((item, idx) => {
                              const nameCol = isFirstLine ? group.name : "";
                              const lineIdCol = isFirstLine ? (group.customerLineId || '') : "";
                              const detailCol = `${code}${item.spec ? ' (' + item.spec + ')' : ''}`;
                              const qtyCol = item.quantity;
                              const priceCol = (idx === cg.items.length - 1) ? cg.subtotal : "";
                              const remarkCol = (isFirstLine && !group.hasShippingFee) ? "免運" : "";
                              tsv += `${nameCol}\t${lineIdCol}\t${detailCol}\t${qtyCol}\t${priceCol}\t${remarkCol}\n`;
                              isFirstLine = false;
                          });
                      });
                      if (group.hasShippingFee) { tsv += `\t\t賣貨便運費\t1\t${SHIPPING_FEE}\t\n`; }
                  });
                  const el = document.createElement('textarea');
                  el.value = tsv;
                  el.style.cssText = 'position:absolute;left:-9999px;top:0;';
                  document.body.appendChild(el);
                  el.select();
                  el.setSelectionRange(0, 999999);
                  const success = document.execCommand('copy');
                  document.body.removeChild(el);
                  if (success) showMessage("✅ 試算表格式已複製！");
                  else throw new Error("copy failed");
              } catch (err) { showMessage("❌ 複製失敗", 'error'); }
          };

          const addPrice = async () => {
            if (!newPriceCode || !newPriceValue) return;
            const code = newPriceCode.toUpperCase();
            const cost = Number(newPriceCost) || 0;
            const name = newPriceName.trim();
            const existing = priceBook[code];
            const existingCost = getCost(existing);
            const existingName = getName(existing);
            let newEntry;
            if (cost > 0 || name || existingCost > 0 || existingName) {
                newEntry = { price: newPriceValue.trim() };
                if (cost > 0) newEntry.cost = cost;
                if (name) newEntry.name = name;
            } else {
                newEntry = newPriceValue.trim();
            }
            const updated = { ...priceBook, [code]: newEntry };
            setPriceBook(updated);
            if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'priceBook'), updated);
            setNewPriceCode(''); setNewPriceValue(''); setNewPriceCost(''); setNewPriceName('');
            showMessage("價格已儲存 ✅");
          };

          const updateCost = async (code, costValue) => {
              const cost = Number(costValue) || 0;
              const existing = priceBook[code];
              const priceStr = getPriceStr(existing);
              const name = getName(existing);
              let newEntry;
              if (cost > 0 || name) { newEntry = { price: priceStr }; if (cost > 0) newEntry.cost = cost; if (name) newEntry.name = name; }
              else { newEntry = priceStr; }
              const updated = { ...priceBook, [code]: newEntry };
              setPriceBook(updated);
              if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'priceBook'), updated);
              showMessage(cost > 0 ? `${code} 成本已更新 $${cost}` : `${code} 成本已清除`);
          };

          const updateName = async (code, nameValue) => {
              const name = String(nameValue || '').trim();
              const existing = priceBook[code];
              const priceStr = getPriceStr(existing);
              const cost = getCost(existing);
              let newEntry;
              if (name || cost > 0) { newEntry = { price: priceStr }; if (cost > 0) newEntry.cost = cost; if (name) newEntry.name = name; }
              else { newEntry = priceStr; }
              const updated = { ...priceBook, [code]: newEntry };
              setPriceBook(updated);
              if (user) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'priceBook'), updated);
              showMessage(name ? `${code} 品名已更新` : `${code} 品名已清除`);
          };

          const updateCustomerLineId = async (group, lineId) => {
              if (!user) return;
              const batch = writeBatch(db);
              group.items.forEach(item => {
                  if (!item.id.startsWith('local-'))
                      batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'orders', item.id), { customerLineId: lineId });
              });
              await batch.commit();
          };

          const updateStockByItem = async (item, newStatus) => {
              if (item.id.startsWith('local-')) {
                  setOrders(prev => prev.map(o => o.id === item.id ? { ...o, stockStatus: newStatus } : o));
              } else if (user) {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', item.id), 
                      { ...item, stockStatus: newStatus }, { merge: true });
              }
              showMessage(`${item.itemCode}${item.spec ? ` (${item.spec})` : ''} → ${STOCK_STATUS[newStatus].label}`);
          };

          const getCreditBalance = (customerName) => storeCredits[customerName]?.balance || 0;

          const handlePrintPickingSheets = () => {
              const targets = groupedOrders.filter(g => {
                  if (pickingFilter !== 'all' && g.status !== pickingFilter) return false;
                  if (pickingDate && formatFullDate(g.date) !== pickingDate) return false;
                  return true;
              });
              if (targets.length === 0) { showMessage("沒有符合條件的訂單", 'warn'); return; }
              setPickingModal(false);
              const sheetsHtml = targets.map((g, idx) => {
                  const statusLabel = g.status === 'shipped' ? '已寄出' : g.status === 'completed' ? '已結單' : '待對帳';
                  const statusColor = g.status === 'shipped' ? '#7A6855' : g.status === 'completed' ? '#6B7A4A' : '#8A7864';
                  const statusBg = g.status === 'shipped' ? '#E8DFD0' : g.status === 'completed' ? '#E8EBE0' : '#EDE6DA';
                  const creditBalance = getCreditBalance(g.name);
                  const totalItemCount = g.items.reduce((s, i) => s + (Number(i.quantity) || 1), 0);
                  const itemsHtml = Object.entries(g.codeGroups).map(([code, cg]) => {
                      const productName = getName(priceBook[code]);
                      return cg.items.map(item => `
                          <div class="ps-item">
                              <div class="ps-checkbox"></div>
                              <div>
                                  <div class="ps-item-code">${code}${item.spec ? `<span style="font-size:12px;color:#888;margin-left:8px;font-weight:400">${item.spec}</span>` : ''}</div>
                                  ${productName ? `<div style="font-size:11px;color:#888;margin-top:2px;font-weight:500">${productName}</div>` : ''}
                              </div>
                              <div class="ps-item-qty">× ${item.quantity}</div>
                          </div>
                      `).join('');
                  }).join('');
                  return `
                      <div class="picking-sheet">
                          <div class="ps-header">
                              <div><div class="ps-brand">${BRAND_NAME}</div><div class="ps-label">Picking Sheet · 揀貨單</div></div>
                              <div class="ps-date">
                                  <div style="font-size:10px;letter-spacing:0.25em;color:#888;text-transform:uppercase">Order Date</div>
                                  <div class="ps-date-big">${formatDate(g.date)}</div>
                                  <div style="font-size:9px;color:#999;margin-top:4px">#${idx + 1} / ${targets.length}</div>
                              </div>
                          </div>
                          <div class="ps-customer">
                              <div>
                                  <div class="ps-customer-name">${g.name}</div>
                                  <div class="ps-customer-meta">${g.customerLineId ? `📱 LINE: ${g.customerLineId}　` : ''}📦 共 ${totalItemCount} 件商品</div>
                              </div>
                              <div class="ps-customer-status" style="background:${statusBg};color:${statusColor}">${statusLabel}</div>
                          </div>
                          <div class="ps-items"><div class="ps-section-title">商品明細 · Items</div>${itemsHtml}</div>
                          <div class="ps-summary">
                              <div class="ps-summary-row"><span>商品小計 Subtotal</span><span>NT$ ${g.itemTotal.toLocaleString()}</span></div>
                              <div class="ps-summary-row"><span>運費 Shipping</span><span>${g.hasShippingFee ? `NT$ ${SHIPPING_FEE}` : '免運 FREE'}</span></div>
                              ${g.creditApplied > 0 ? `<div class="ps-summary-row" style="color:#B8A582"><span>🎁 購物金折抵</span><span>- NT$ ${g.creditApplied.toLocaleString()}</span></div>` : ''}
                              <div class="ps-summary-row total"><span>應付總額 TOTAL</span><span class="ps-total-amount">NT$ ${g.finalTotal.toLocaleString()}</span></div>
                          </div>
                          <div class="ps-notes">
                              <div class="ps-notes-title">備註 · Notes</div>
                              ${creditBalance > 0 ? `<div style="font-size:11px;color:#B8A582;margin-bottom:6px">🎁 客人購物金餘額：NT$ ${creditBalance.toLocaleString()}</div>` : ''}
                              <div class="ps-notes-lines"></div><div class="ps-notes-lines"></div><div class="ps-notes-lines"></div>
                          </div>
                          <div style="margin-top:20px;display:flex;gap:10px">
                              <div class="ps-check-badge">☐ 已揀貨</div>
                              <div class="ps-check-badge">☐ 已包裝</div>
                              <div class="ps-check-badge">☐ 已寄出</div>
                          </div>
                          <div class="ps-footer"><span>${BRAND_NAME}</span><span>Printed on ${formatFullDate(new Date())}</span></div>
                      </div>
                  `;
              }).join('');
              const fullHtml = `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>揀貨單 - ${BRAND_NAME}</title>
                  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
                  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'Noto Sans TC', sans-serif; color: #2a2a2a; background: white; }
                  .picking-sheet { width: 210mm; min-height: 297mm; padding: 20mm 18mm; box-sizing: border-box; page-break-after: always; }
                  .picking-sheet:last-child { page-break-after: auto; }
                  .ps-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid #3A3A3A; padding-bottom: 12px; margin-bottom: 20px; }
                  .ps-brand { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 900; font-size: 32px; color: #B8A582; line-height: 1; }
                  .ps-label { font-size: 10px; letter-spacing: 0.3em; color: #888; text-transform: uppercase; margin-top: 4px; }
                  .ps-date { text-align: right; font-size: 11px; color: #555; }
                  .ps-date-big { font-family: 'DM Serif Display', serif; font-size: 22px; color: #3A3A3A; line-height: 1; margin-top: 2px; }
                  .ps-customer { background: #FAF7F2; border: 2px solid #3A3A3A; border-radius: 4px; padding: 16px 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
                  .ps-customer-name { font-size: 24px; font-weight: 900; color: #3A3A3A; letter-spacing: 2px; }
                  .ps-customer-meta { font-size: 11px; color: #6B6B6B; margin-top: 4px; }
                  .ps-customer-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 900; letter-spacing: 1px; }
                  .ps-section-title { font-size: 10px; letter-spacing: 0.25em; color: #888; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px dashed #DDD; }
                  .ps-items { margin-bottom: 24px; }
                  .ps-item { display: grid; grid-template-columns: 24px 1fr auto; gap: 12px; padding: 10px 4px; border-bottom: 1px solid #EEE; align-items: center; }
                  .ps-checkbox { width: 18px; height: 18px; border: 2px solid #888; border-radius: 3px; }
                  .ps-item-code { font-weight: 900; font-size: 14px; color: #3A3A3A; }
                  .ps-item-qty { font-family: 'DM Serif Display', serif; font-size: 20px; color: #B8A582; min-width: 50px; text-align: right; }
                  .ps-summary { background: #FAF7F2; border-radius: 4px; padding: 16px 20px; margin-bottom: 18px; }
                  .ps-summary-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: #555; }
                  .ps-summary-row.total { border-top: 2px solid #3A3A3A; margin-top: 8px; padding-top: 10px; font-size: 15px; font-weight: 900; color: #3A3A3A; }
                  .ps-total-amount { font-family: 'DM Serif Display', serif; font-size: 24px; color: #B8A582; }
                  .ps-notes { border: 1px dashed #AAA; border-radius: 4px; padding: 12px 16px; min-height: 50px; }
                  .ps-notes-title { font-size: 10px; letter-spacing: 0.25em; color: #888; font-weight: 700; margin-bottom: 6px; }
                  .ps-notes-lines { border-bottom: 1px solid #DDD; height: 18px; margin-top: 4px; }
                  .ps-footer { margin-top: 20px; padding-top: 12px; border-top: 1px solid #DDD; display: flex; justify-content: space-between; font-size: 9px; color: #999; letter-spacing: 0.1em; }
                  .ps-check-badge { display: inline-flex; align-items: center; gap: 8px; background: white; border: 1.5px solid #3A3A3A; padding: 6px 12px; border-radius: 3px; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; }
                  @media print { @page { size: A4; margin: 0; } body { margin: 0; } }
                  </style></head><body>${sheetsHtml}
                  <scr${''}ipt>window.addEventListener('load',function(){setTimeout(function(){window.focus();window.print();},500);});</scr${''}ipt>
                  </body></html>`;
              const printWindow = window.open('', '_blank', 'width=800,height=900');
              if (!printWindow) { showMessage("請允許瀏覽器開啟彈出視窗", 'error'); return; }
              printWindow.document.open();
              printWindow.document.write(fullHtml);
              printWindow.document.close();
              showMessage(`準備列印 ${targets.length} 張揀貨單...`);
          };

          const adjustStoreCredit = async (customerName, delta, note = '') => {
              if (!customerName) return;
              const current = storeCredits[customerName] || { balance: 0, history: [] };
              const newBalance = Math.max(0, (current.balance || 0) + delta);
              const historyEntry = { time: new Date().toISOString(), amount: delta, note: note || (delta > 0 ? '手動發放' : '手動扣除'), balanceAfter: newBalance };
              const newData = { balance: newBalance, history: [...(current.history || []), historyEntry].slice(-50) };
              if (user) {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'storeCredits', customerName), newData);
              } else {
                  setStoreCredits(prev => ({ ...prev, [customerName]: newData }));
              }
              showMessage(`${customerName} 購物金 ${delta > 0 ? '+' : ''}${delta} (餘額 $${newBalance})`);
          };

          const applyCreditToOrder = async (group, creditToUse) => {
              const balance = getCreditBalance(group.name);
              const validCredit = Math.min(Math.max(0, Number(creditToUse) || 0), balance, group.itemTotal);
              if (validCredit > 0) await adjustStoreCredit(group.name, -validCredit, `訂單折抵 (${formatDate(group.date)})`);
              const firstItem = group.items[0];
              if (firstItem && !firstItem.id.startsWith('local-') && user) {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', firstItem.id), { creditApplied: validCredit }, { merge: true });
              }
              showMessage(`✅ 已折抵 $${validCredit}`);
          };

          const archiveOrderIds = async (orderIds, silent = false) => {
              if (!user || orderIds.length === 0) return 0;
              try {
                  const batch = writeBatch(db);
                  let count = 0;
                  for (const orderId of orderIds) {
                      const order = orders.find(o => o.id === orderId);
                      if (!order) continue;
                      const archiveData = { ...order };
                      delete archiveData.id;
                      archiveData.archivedAt = new Date().toISOString();
                      batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'archivedOrders', orderId), archiveData);
                      batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'orders', orderId));
                      count++;
                  }
                  await batch.commit();
                  if (!silent && count > 0) showMessage(`✅ 已歸檔 ${count} 筆訂單`);
                  return count;
              } catch (err) {
                  if (!silent) showMessage("歸檔失敗，請稍後再試", 'error');
                  return 0;
              }
          };

          const archiveThisMonthShipped = async () => {
              const now = new Date();
              const ym = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
              const targets = orders.filter(o => {
                  if (o.status !== 'shipped') return false;
                  if (!o.createdAt || !o.createdAt.seconds) return false;
                  const d = new Date(o.createdAt.seconds * 1000);
                  const orderYm = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                  return orderYm === ym;
              });
              if (targets.length === 0) { showMessage("本月沒有已寄出的訂單可歸檔", 'warn'); return; }
              if (!confirm(`確定要歸檔本月 ${targets.length} 筆已寄出的訂單嗎？`)) return;
              setIsArchiving(true);
              await archiveOrderIds(targets.map(o => o.id));
              setIsArchiving(false);
          };

          useEffect(() => {
              if (!user || autoArchiveChecked || orders.length === 0) return;
              const now = Date.now();
              const threshold = ARCHIVE_DAYS_THRESHOLD * 24 * 60 * 60 * 1000;
              const oldOrderIds = orders.filter(o => {
                  if (!o.createdAt || !o.createdAt.seconds) return false;
                  return (now - o.createdAt.seconds * 1000) > threshold;
              }).map(o => o.id);
              if (oldOrderIds.length > 0) {
                  archiveOrderIds(oldOrderIds, true).then(count => {
                      if (count > 0) showMessage(`🗄 已自動歸檔 ${count} 筆 ${ARCHIVE_DAYS_THRESHOLD} 天前的訂單`);
                  });
              }
              setAutoArchiveChecked(true);
          }, [user, orders, autoArchiveChecked]);

          const sendMessageToCustomer = (group, type) => {
              // ✅ 動態讀取：優先用 Firebase 設定的值，再用預設
              const activeLineOaId = storeConfig.lineOaId || LINE_OA_ID;

                                <p className="text-[10px] text-[#888888] font-bold mt-1">會顯示在登入頁和揀貨單上</p></div>
                                <input value={brand} onChange={e=>setBrand(e.target.value)} placeholder="例：Sara Boutique"
                                    className="w-full py-4 px-4 rounded-2xl text-center text-lg font-black outline-none bg-[#F5F1EA] border-none"/>
                                <button onClick={()=>{if(brand.trim()){setErr('');setStep(2);}else setErr('請填品牌名稱');}}
                                    className="w-full py-4 bg-[#333] text-white rounded-2xl text-xs font-bold tracking-widest active:scale-95">下一步</button>
                            </>}
                            {step===2 && <>
                                <div className="text-center"><h3 className="font-black text-[#3A3A3A]">Step 2 · 安全設定</h3></div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-[#6B6B6B] uppercase">管理員密碼（4-6位數字）</label>
                                    <input value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,'').slice(0,6))} placeholder="例：1234"
                                        className="w-full py-3.5 px-4 rounded-2xl text-center text-lg font-black tracking-[0.3em] outline-none bg-[#F5F1EA] border-none"/>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-[#6B6B6B] uppercase">LINE 官方帳號 ID（選填）</label>
                                    <input value={line} onChange={e=>setLine(e.target.value)} placeholder="例：@abc1234（留空則用預設）"
                                        className="w-full py-3.5 px-4 rounded-2xl text-sm font-bold outline-none bg-[#F5F1EA] border-none"/>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={()=>{setErr('');setStep(1);}} className="flex-1 py-3.5 bg-[#F5F1EA] text-[#6B6B6B] rounded-2xl text-xs font-bold">上一步</button>
                                    <button onClick={finish} className="flex-1 py-3.5 bg-[#B8A582] text-white rounded-2xl text-xs font-bold flex items-center justify-center gap-1.5">
                                        <CheckCircle size={14}/> 完成！開始使用
                                    </button>
                                </div>
                            </>}
                        </div>
                    </div>
                </div>
            );
        };

        const NotConfigured = () => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-[#FAF7F2]">
                <div className="w-full max-w-xs text-center">
                    <AlertTriangle size={32} className="mx-auto mb-4 text-[#B8A582]"/>
                    <h1 className="text-xl font-black text-[#3A3A3A] mb-2">系統尚未設定</h1>
                    <p className="text-[11px] text-[#6B6B6B] font-bold">請聯繫賣家協助設定</p>
                </div>
            </div>
        );

        const Root = () => {
            if (!FIREBASE_OK) return <NotConfigured/>;
            if (!isLicensed()) return <LicensePage/>;
            if (!_setup) return <SetupWizard/>;
            return <App/>;
        };
        createRoot(document.getElementById('root')).render(<Root/>);
    </script>
</body>
</html>
